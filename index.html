<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영단어 목록</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<nav>
  <span class="logo">📚 영단어 공부</span>
  <a href="index.html" class="active">전체 단어</a>
  <a href="quiz.html">퀴즈표</a>
  <button class="nav-storage-btn" id="storage-btn" onclick="openStorageModal()">💾 로컬</button>
</nav>

<div class="page-header">
  <h1>전체 단어 목록</h1>
  <select id="chapter-jump" onchange="jumpToChapter(this.value)">
    <option value="">── 챕터 이동 ──</option>
  </select>
</div>

<div class="legend">
  <div class="mode-radios">
    <label class="filter-all-label">
      <input type="checkbox" id="idx-filter-all" checked onchange="toggleAllFilters(this.checked)">
      전체
    </label>
    <span class="filter-divider"></span>
    <label>
      <input type="checkbox" id="idx-filter-basic" value="basic" checked onchange="syncAllFilterCheckbox(); filterCards()">
      <span class="mode-swatch swatch-basic"></span>기본
    </label>
    <label>
      <input type="checkbox" id="idx-filter-focus" value="focus" checked onchange="syncAllFilterCheckbox(); filterCards()">
      <span class="mode-swatch swatch-focus"></span>집중
    </label>
    <label>
      <input type="checkbox" id="idx-filter-more" value="more" checked onchange="syncAllFilterCheckbox(); filterCards()">
      <span class="mode-swatch swatch-more"></span>더 집중
    </label>
  </div>
  <span style="font-size:0.8rem; color:#888;">단어를 클릭하면 모드를 선택할 수 있어요</span>
</div>

<div id="chapters-container"></div>

<script src="data.js"></script>
<script>
  // ── Firebase ──
  const firebaseConfig = {
    apiKey: "AIzaSyBBLliEhUZHFzw4r3Xk6piiYjk9UFauJvE",
    authDomain: "eng-word-1.firebaseapp.com",
    projectId: "eng-word-1",
    storageBucket: "eng-word-1.firebasestorage.app",
    messagingSenderId: "342379526397",
    appId: "1:342379526397:web:946215d945f6f3da0ea694"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── Storage ──
  const STORAGE_KEY      = 'word_modes';
  const STORAGE_MODE_KEY = 'storage_mode';  // 'local' | 'web'

  function getStorageMode() { return localStorage.getItem(STORAGE_MODE_KEY) || 'web'; }
  function loadFromLocal() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }
  function saveToLocal(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  async function loadFromFirestore() {
    try {
      const snap = await db.collection('wordData').doc('modes').get();
      return snap.exists ? (snap.data().data || {}) : {};
    } catch { return loadFromLocal(); }
  }

  async function saveToFirestore(data) {
    try { await db.collection('wordData').doc('modes').set({ data }); }
    catch { /* silent */ }
  }

  function debounce(fn, delay) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
  }
  const debouncedSaveToFirestore = debounce(saveToFirestore, 1000);

  async function loadModes() {
    return getStorageMode() === 'web' ? loadFromFirestore() : loadFromLocal();
  }
  function saveModes(data) {
    if (getStorageMode() === 'web') debouncedSaveToFirestore(data);
    else saveToLocal(data);
  }

  // ── Storage modal ──
  function updateStorageBtn() {
    document.getElementById('storage-btn').textContent =
      getStorageMode() === 'web' ? '☁️ 웹' : '💾 로컬';
  }
  function openStorageModal() {
    const mode = getStorageMode();
    document.getElementById('btn-mode-local').classList.toggle('active', mode === 'local');
    document.getElementById('btn-mode-web').classList.toggle('active', mode === 'web');
    document.getElementById('gh-modal').classList.add('open');
  }
  function selectMode(mode) {
    document.getElementById('btn-mode-local').classList.toggle('active', mode === 'local');
    document.getElementById('btn-mode-web').classList.toggle('active', mode === 'web');
  }
  function closeStorageModal() { document.getElementById('gh-modal').classList.remove('open'); }
  async function applyStorageMode() {
    const isWeb = document.getElementById('btn-mode-web').classList.contains('active');
    localStorage.setItem(STORAGE_MODE_KEY, isWeb ? 'web' : 'local');
    closeStorageModal();
    updateStorageBtn();
    modes = await loadModes();
    renderDOM();
  }

  // ── State ──
  let modes = {};
  let openPopup = null;
  let openCard  = null;

  // ── Build chapter-jump select ──
  const container  = document.getElementById('chapters-container');
  const jumpSelect = document.getElementById('chapter-jump');
  CHAPTERS.forEach(chapter => {
    const opt = document.createElement('option');
    opt.value = chapter.id;
    opt.textContent = `${chapter.id}. ${chapter.name}`;
    jumpSelect.appendChild(opt);
  });

  function jumpToChapter(id) {
    if (!id) return;
    const el = document.getElementById('chapter-' + id);
    if (el) window.scrollTo(0, el.getBoundingClientRect().top + window.scrollY - 58);
    jumpSelect.value = '';
  }

  // ── Render DOM ──
  const modeClass = mode => mode === 'focus' ? ' mode-focus' : mode === 'more' ? ' mode-more' : '';

  function renderDOM() {
    container.innerHTML = CHAPTERS.map(chapter => `
      <div class="chapter-section" id="chapter-${chapter.id}">
        <div class="chapter-title-row">
          <div class="chapter-title">${chapter.id}. ${chapter.name}</div>
          <button class="btn-top" data-top="1">↑ 맨 위</button>
        </div>
        <div class="word-grid">
          ${chapter.words.map((item, idx) => {
            const key  = `${chapter.id}-${idx}`;
            const mode = modes[key] || 'basic';
            return `<div class="word-card${modeClass(mode)}" data-key="${key}">
              <div class="eng">${item.word}</div>
              <div class="kor">${item.meaning}</div>
              <div class="mode-popup">
                <button data-mode="basic"><span class="dot dot-basic"></span>기본</button>
                <button data-mode="focus"><span class="dot dot-focus"></span>집중</button>
                <button data-mode="more"><span class="dot dot-more"></span>더 집중</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `).join('');
    filterCards();
  }

  // ── Event delegation ──
  container.addEventListener('click', e => {
    if (e.target.closest('[data-top]')) { window.scrollTo(0, 0); return; }
    const modeBtn = e.target.closest('[data-mode]');
    if (modeBtn) {
      e.stopPropagation();
      const card = modeBtn.closest('.word-card');
      const mode = modeBtn.dataset.mode;
      modes[card.dataset.key] = mode;
      saveModes(modes);
      applyMode(card, mode);
      closePopup();
      return;
    }
    const card = e.target.closest('.word-card');
    if (card) {
      e.stopPropagation();
      const popup = card.querySelector('.mode-popup');
      if (popup === openPopup) { closePopup(); return; }
      closePopup();
      popup.classList.add('open');
      card.classList.add('active');
      openPopup = popup;
      openCard  = card;
    }
  });

  function closePopup() {
    if (openPopup) { openPopup.classList.remove('open'); openPopup = null; }
    if (openCard)  { openCard.classList.remove('active'); openCard = null; }
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('.gh-panel')) closePopup();
  });

  function applyMode(card, mode) {
    card.classList.remove('mode-focus', 'mode-more');
    if (mode === 'focus') card.classList.add('mode-focus');
    if (mode === 'more')  card.classList.add('mode-more');
    filterCards();
  }
  function getCardMode(card) {
    if (card.classList.contains('mode-more'))  return 'more';
    if (card.classList.contains('mode-focus')) return 'focus';
    return 'basic';
  }
  function filterCards() {
    const active = ['basic', 'focus', 'more'].filter(v =>
      document.getElementById(`idx-filter-${v}`).checked
    );
    document.querySelectorAll('.word-card').forEach(card => {
      card.style.display = active.includes(getCardMode(card)) ? '' : 'none';
    });
  }
  function toggleAllFilters(checked) {
    ['basic', 'focus', 'more'].forEach(v => {
      document.getElementById(`idx-filter-${v}`).checked = checked;
    });
    filterCards();
  }
  function syncAllFilterCheckbox() {
    const all = ['basic', 'focus', 'more'].every(v =>
      document.getElementById(`idx-filter-${v}`).checked
    );
    document.getElementById('idx-filter-all').checked = all;
  }

  // ── Init ──
  async function init() {
    modes = await loadModes();
    renderDOM();
    updateStorageBtn();
  }
  init();
</script>

<!-- Storage Modal -->
<div class="gh-modal-overlay" id="gh-modal" onclick="if(event.target===this)closeStorageModal()">
  <div class="gh-panel">
    <h3>저장 방식</h3>
    <div class="gh-mode-btns">
      <button id="btn-mode-local" onclick="selectMode('local')">💾 로컬</button>
      <button id="btn-mode-web"   onclick="selectMode('web')">☁️ 웹</button>
    </div>
    <div class="gh-panel-actions">
      <button class="btn-secondary" onclick="closeStorageModal()">취소</button>
      <button class="btn-primary" onclick="applyStorageMode()">적용</button>
    </div>
  </div>
</div>
</body>
</html>
